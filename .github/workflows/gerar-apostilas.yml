name: "🚀 Gerar Apostilas EBE (11/dia - Agressivo)"

on:
  # 4 Execuções diárias automáticas
  schedule:
    # Primeira execução: 3 apostilas
    - cron: "0 9 * * *"    # 09:00 UTC
    
    # Segunda execução: 3 apostilas
    - cron: "0 13 * * *"   # 13:00 UTC
    
    # Terceira execução: 3 apostilas
    - cron: "0 17 * * *"   # 17:00 UTC
    
    # Quarta execução: 2 apostilas
    - cron: "0 21 * * *"   # 21:00 UTC
  
  # Manual: Permitir disparo manual com batch customizado
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Número de apostilas a gerar (1-5)"
        required: false
        default: "3"
        type: string
      model:
        description: "Modelo Gemini"
        required: false
        default: "gemini-2.5-flash"
        type: choice
        options:
          - "gemini-2.5-flash"
          - "gemini-2.0-flash"

permissions:
  contents: write

env:
  BATCH_SIZE: ${{ github.event.inputs.batch_size || '3' }}
  GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}

jobs:
  gerar:
    name: "📝 Gerar Apostilas"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Instalar Dependências"
        run: |
          pip install --no-cache-dir \
            python-docx \
            google-generativeai

      - name: "🔐 Validar Secrets"
        run: |
          [ -n "$GEMINI_API_KEY" ] || (echo "❌ GEMINI_API_KEY não configurada" && exit 1)
          echo "✅ Secrets validadas"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: "📝 Gerar Apostilas"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BATCH_SIZE: ${{ env.BATCH_SIZE }}
          GEMINI_MODEL: ${{ env.GEMINI_MODEL }}
        run: python scripts/gerar_apostila.py

      - name: "⚙️ Configurar Git"
        if: always()
        run: |
          git config user.name "🤖 Apostila Bot"
          git config user.email "bot@apostilas.local"

      - name: "💾 Push Automático"
        if: always()
        run: |
          if git diff --quiet HEAD; then
            echo "⏭️  Nenhuma mudança para commitar"
          else
            git add apostilas/ scripts/estado.json scripts/ultimo_batch.json 2>/dev/null || true
            git commit -m "chore: apostilas geradas — $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin main || true
          fi

      - name: "📊 Resumo do Batch"
        if: always()
        run: |
          if [ -f scripts/estado.json ]; then
            TOTAL=$(python3 -c "import json; e=json.load(open('scripts/estado.json')); print(e.get('total_gerado', 0))" 2>/dev/null || echo "0")
            RESTANTES=$((1029 - TOTAL))
            DIAS=$((RESTANTES / 11))
            
            echo "## 📊 Resumo do Batch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Status:** Concluído" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total Gerado:** $TOTAL / 1029 apostilas" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Restantes:** $RESTANTES (~$DIAS dias a 11/dia)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Batch Size:** ${{ env.BATCH_SIZE }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Modelo:** ${{ env.GEMINI_MODEL }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Horário UTC:** $(date -u +'%H:%M')" >> $GITHUB_STEP_SUMMARY
          fi
