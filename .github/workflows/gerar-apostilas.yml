# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Workflow: Geração Automática de Apostilas EBE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Gera apostilas usando Gemini AI e faz upload directo para Drive.
#
# LIMITES DO PLANO GRATUITO:
#   GitHub Actions: 2.000 min/mês (privado) ou ilimitado (público)
#   Gemini 2.5 Flash: ~15 RPM, ~1M tokens/dia, ~1.500 RPD
#
# CONFIGURAÇÃO:
#   Batch: 3 apostilas/execução | Cron: a cada 8h
#   ~9 apostilas/dia → ~270/mês → ~4 meses para 1.029
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: "Gerar Apostilas EBE"

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Número de apostilas a gerar"
        required: false
        default: "3"
        type: string
      model:
        description: "Modelo Gemini"
        required: false
        default: "gemini-2.5-flash"
        type: choice
        options:
          - "gemini-2.5-flash"
          - "gemini-2.5-pro"
          - "gemini-2.0-flash"

  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

env:
  BATCH_SIZE: ${{ github.event.inputs.batch_size || '3' }}
  GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}

jobs:
  gerar:
    name: "📝 Gerar Apostilas"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Dependências"
        run: pip install python-docx google-generativeai google-api-python-client google-auth google-auth-oauthlib

      - name: "🔍 Testar Drive"
        continue-on-error: true
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python scripts/gerar_apostila.py --test-drive

      - name: "📝 Gerar apostilas"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python scripts/gerar_apostila.py

      - name: "💾 Commit do progresso"
        if: always()
        run: bash scripts/commit_progresso.sh

      - name: "📊 Resumo"
        if: always()
        run: |
          echo "## 📊 Resumo do Batch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f scripts/estado.json ]; then
            TOTAL=$(python3 -c "import json; e=json.load(open('scripts/estado.json')); print(len(e.get('concluidas',[])))")
            echo "**Total gerado:** $TOTAL / 1029 apostilas" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Batch size:** ${{ env.BATCH_SIZE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Modelo:** ${{ env.GEMINI_MODEL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
